name: ♻️ 同步上游动态库

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, freebsd]
        lib: [sbx, bot, agent, v1]
      fail-fast: false
    steps:
      - name: 下载 ${{ matrix.lib }}-${{ matrix.arch }}.so 并生成 SHA256
        id: dl
        continue-on-error: true
        run: |
          FILENAME="${{ matrix.lib }}-${{ matrix.arch }}.so"

          case "${{ matrix.arch }}" in
            amd64)   URL="https://amd64.31888.xyz/${{ matrix.lib }}.so" ;;
            arm64)   URL="https://arm64.31888.xyz/${{ matrix.lib }}.so" ;;
            freebsd) URL="https://00.ssss.nyc.mn/freebsd-${{ matrix.lib }}.so" ;;
          esac

          echo "Downloading $URL → $FILENAME"

          if curl -fSL --retry 3 --retry-delay 5 -o "$FILENAME" "$URL"; then
            SHA=$(sha256sum "$FILENAME" | awk '{print $1}')
            echo "sha256=$SHA"
            echo "sha256=$SHA"        >> $GITHUB_OUTPUT
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
            echo "$SHA" > "${FILENAME}.sha256"
            echo "success=true"       >> $GITHUB_OUTPUT
          else
            echo "⚠️ 下载失败，跳过：$URL"
            echo "success=false"      >> $GITHUB_OUTPUT
          fi

      - name: 上传 .so 文件
        if: steps.dl.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.lib }}-${{ matrix.arch }}
          path: ${{ steps.dl.outputs.filename }}

      - name: 上传 SHA256 文件
        if: steps.dl.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sha-${{ matrix.lib }}-${{ matrix.arch }}
          path: ${{ steps.dl.outputs.filename }}.sha256

  publish:
    needs: download
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 整理文件
        run: |
          mkdir -p libs sha-files
          find artifacts -name '*.so'     -exec mv {} libs/ \;
          find artifacts -name '*.sha256' -exec mv {} sha-files/ \;
          echo "=== 已收集的库文件 ==="
          ls -lh libs/
          echo "=== SHA256 文件 ==="
          ls sha-files/

      - name: 生成当前哈希字典 current_sha.json
        run: |
          echo '{}' > current_sha.json
          for sha_file in sha-files/*.sha256; do
            [ -f "$sha_file" ] || continue
            fname=$(basename "$sha_file" .sha256)
            hash=$(cat "$sha_file")
            jq --arg name "$fname" --arg hash "$hash" \
              '.[$name] = $hash' current_sha.json > tmp.json \
              && mv tmp.json current_sha.json
          done
          jq -S '.' current_sha.json > sorted.json && mv sorted.json current_sha.json
          echo "=== 当前哈希 ==="
          cat current_sha.json

      - name: 读取旧 Release 哈希（从 Body 解析）
        id: old_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view so-files-latest --json tagName &>/dev/null; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
            # 获取 Release Body 中的 ```json ... ``` 代码块
            BODY=$(gh release view so-files-latest --json body -q '.body')
            HASH_JSON=$(echo "$BODY" | sed -n '/```json/,/```/p' | sed '1d;$d')
            if echo "$HASH_JSON" | jq empty 2>/dev/null; then
              echo "$HASH_JSON" | jq -S '.' > prev_sha.json
              echo "=== 旧哈希（来自 Release Body）==="
              cat prev_sha.json
            else
              echo "⚠️ Release Body 中未包含有效哈希信息，视为首次发布"
              echo '{}' > prev_sha.json
            fi
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
            echo "未找到已有 Release，将执行首次发布"
            echo '{}' > prev_sha.json
          fi

      - name: 判断是否需要更新
        id: compare
        run: |
          SAME=$(jq -n \
            --slurpfile cur  current_sha.json \
            --slurpfile prev prev_sha.json \
            '$cur[0] == $prev[0]')

          if [ "$SAME" = "true" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ 所有文件与上次 Release 完全一致，跳过发布"
          else
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "📦 检测到文件变化，将更新 Release"
            echo "--- 变动详情 ---"
            jq -n \
              --slurpfile cur  current_sha.json \
              --slurpfile prev prev_sha.json \
              '($cur[0] | to_entries) | map(
                  select(.value != ($prev[0][.key] // ""))
                ) | from_entries'
          fi

      - name: 生成 Release body（内嵌哈希 JSON）
        if: steps.compare.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          cat > release-body.md << 'BODYEOF'
          ## 动态库集合（自动同步）

          上游变动时自动更新，每日 UTC 02:00 检查。

          | 平台 | 上游地址 |
          |------|---------|
          | amd64   | `https://amd64.31888.xyz/` |
          | arm64   | `https://arm64.31888.xyz/` |
          | freebsd | `https://00.ssss.nyc.mn/freebsd-*.so` |

          BODYEOF

          # 添加哈希 JSON 代码块
          echo ""                         >> release-body.md
          echo "### 🔑 本次文件哈希"      >> release-body.md
          echo '```json'                  >> release-body.md
          cat current_sha.json            >> release-body.md
          echo '```'                      >> release-body.md
          echo ""                         >> release-body.md
          echo "更新时间：$TIMESTAMP"     >> release-body.md

      - name: 准备发布产物
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "=== 最终发布文件列表 ==="
          ls -lh libs/

      - name: 发布/更新 Release（只上传 .so 文件）
        if: steps.compare.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: so-files-latest
          name: "动态库集合"
          body_path: release-body.md
          files: libs/*.so
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 无变化提示
        if: steps.compare.outputs.changed != 'true'
        run: echo "本次检查无更新，无需发布新 Release"

      - name: 清理旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
