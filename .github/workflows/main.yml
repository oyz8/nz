name: 同步上游动态库

on:
  schedule:
    - cron: '0 2 * * *'         # 每天 UTC 2:00
  workflow_dispatch:

jobs:
  # ── 1. 下载所有架构/库的 .so 并计算 SHA256 ──
  download:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        lib: [sbx, bot, agent, v1]
      fail-fast: false
    outputs:
      # 将每个 job 的 sha256 值合成为一个 JSON 需要通过 artifact 传递，此处不设置 outputs
    steps:
      - name: 下载 ${{ matrix.lib }}-${{ matrix.arch }}.so 并计算 SHA256
        id: download
        run: |
          FILENAME="${{ matrix.lib }}-${{ matrix.arch }}.so"
          URL="https://${{ matrix.arch }}.31888.xyz/${{ matrix.lib }}.so"
          echo "下载 $URL"
          curl -fSL --retry 3 --retry-delay 5 -o "$FILENAME" "$URL"
          SHA=$(sha256sum "$FILENAME" | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: 上传 .so 文件
        uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.lib }}-${{ matrix.arch }}
          path: ${{ steps.download.outputs.filename }}

      - name: 上传 SHA256 信息
        uses: actions/upload-artifact@v4
        with:
          name: sha-${{ matrix.lib }}-${{ matrix.arch }}
          # 将 sha256 写入一个文本文件，方便后续收集
          path: |
            ${{ steps.download.outputs.filename }}.sha256
        # 生成 sha 文件
        run: |
          echo "${{ steps.download.outputs.sha256 }}" > "${{ steps.download.outputs.filename }}.sha256"

  # ── 2. 收集 SHA256，比较并决定是否发布 ──
  publish:
    needs: download
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: 下载所有 .so 文件和 SHA256
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 整理下载的文件
        run: |
          mkdir -p libs
          # 将所有 .so 文件移到 libs/
          find artifacts -name '*.so' -exec mv {} libs/ \;
          # 收集所有 .sha256 文件
          mkdir -p sha-files
          find artifacts -name '*.sha256' -exec mv {} sha-files/ \;

      - name: 构建当前文件的 SHA256 字典
        id: current
        run: |
          echo "{}" > current_sha.json
          for sha_file in sha-files/*.sha256; do
            fname=$(basename "$sha_file" .sha256)
            hash=$(cat "$sha_file")
            # 使用 jq 添加键值对
            jq --arg name "$fname" --arg hash "$hash" \
              '.[$name] = $hash' current_sha.json > tmp.json && mv tmp.json current_sha.json
          done
          echo "当前文件 SHA256:"
          cat current_sha.json

      - name: 获取最新 Release 中记录的 SHA256
        id: prev_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 尝试获取 tag 为 so-files-latest 的 release
          if gh release view so-files-latest --json body --jq .body > release_body.txt 2>/dev/null; then
            echo "找到旧 Release"
            # 从 body 中提取 JSON 块（假设 body 中是 ```json ... ``` 包裹的）
            sed -n '/```json/,/```/p' release_body.txt | sed '1d;$d' > prev_sha.json
            if [ ! -s prev_sha.json ]; then
              echo "无法从 body 提取 JSON，视为无旧数据"
              echo '{}' > prev_sha.json
            fi
          else
            echo "未找到旧 Release，将创建新 Release"
            echo '{}' > prev_sha.json
          fi
          echo "旧 SHA256 记录:"
          cat prev_sha.json

      - name: 比较 SHA256，判断是否需要更新
        id: compare
        run: |
          CHANGED=false
          # 遍历当前文件
          for file in libs/*.so; do
            fname=$(basename "$file")
            cur_hash=$(jq -r ".[\"$fname\"]" current_sha.json)
            prev_hash=$(jq -r ".[\"$fname\"] // empty" prev_sha.json)
            if [ "$cur_hash" != "$prev_hash" ]; then
              echo "文件 $fname 发生变化: $prev_hash -> $cur_hash"
              CHANGED=true
            fi
          done
          # 如果有新增文件（当前有，旧记录没有），也视为变化
          NEW_FILES=$(jq -r 'keys[]' current_sha.json | while read k; do
            if ! jq -e ".\"$k\"" prev_sha.json >/dev/null 2>&1; then
              echo "$k"
            fi
          done)
          if [ -n "$NEW_FILES" ]; then
            echo "新增文件: $NEW_FILES"
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: 生成新的 Release Body（含 SHA256 字典）
        if: steps.compare.outputs.changed == 'true'
        run: |
          cat > release-body.md <<EOF
          动态库集合（自动更新）

          每日 UTC 2:00 检查上游更新，仅在文件变化时更新此 Release。

          \`\`\`json
          $(cat current_sha.json)
          \`\`\`
          EOF

      - name: 发布/更新 GitHub Release
        if: steps.compare.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: so-files-latest
          name: "动态库集合"
          body_path: release-body.md
          files: libs/*
          make_latest: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 无变化，跳过发布
        if: steps.compare.outputs.changed != 'true'
        run: echo "所有 .so 文件与上次 Release 一致，无需更新。"
